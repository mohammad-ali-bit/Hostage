<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hostage Study Hub</title>
    <link rel="icon" type="image/png" href="image_3.png">
    <link rel="stylesheet" href="style.css">
</head>

<body
    style="margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-color: #121212; color: white;">

    <div id="toast-container"
        style="position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px;">
    </div>

    <div class="header"
        style="flex-shrink: 0; padding: 15px 20px; background-color: #1a1a1a; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="image_3.png" alt="Logo" style="height: 35px; width: 35px; object-fit: cover; border-radius: 50%;">
            <h1 style="margin: 0; font-size: 1.5rem;">Hostage Study Hub</h1>
        </div>
        <div id="pomodoro-display"
            style="font-size: 1.5em; font-weight: bold; color: #ef4444; font-family: monospace; padding-right: 20px;">
            25:00</div>
    </div>

    <div class="main-container" style="flex-grow: 1; display: flex; overflow: hidden;">

        <div id="auth-view" style="display: none; align-items: center; justify-content: center; width: 100%;">
            <div class="auth-box">
                <h2 style="margin-top: 0; margin-bottom: 24px;">Join Synced Room</h2>
                <input type="text" id="userName" class="input-code" placeholder="YOUR NAME" autocomplete="off"
                    spellcheck="false" maxlength="15">
                <input type="text" id="roomCode" class="input-code" placeholder="ROOM CODE" autocomplete="off"
                    spellcheck="false" maxlength="8">
                <button id="createRoomBtn" class="btn-lock" style="margin-bottom: 8px;">Create Room</button>
                <button id="joinRoomBtn" class="btn-lock" style="background-color: var(--accent-color);">Join
                    Room</button>
            </div>
        </div>

        <div id="hub-view" class="study-hub-container" style="display: flex; width: 100%; height: 100%;">

            <div class="chat-panel"
                style="width: 30%; border-right: 2px solid #333; display: flex; flex-direction: column; height: 100%; background-color: #1e1e24;">

                <div style="padding: 15px; border-bottom: 1px solid #444; flex-shrink: 0;">
                    <h3 style="margin-top: 0;">ACTIVE HOSTAGES</h3>
                    <div id="active-hostages-list" style="margin-bottom: 15px;"></div>
                    <h3 id="room-display" style="color: #4ade80; margin: 0;">Room: Waiting...</h3>
                </div>

                <div id="chat-messages"
                    style="flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px;">
                    <div style="color: #aaa; font-style: italic; font-size: 0.9em;">Chat history started...</div>
                </div>

                <div id="chat-input-area"
                    style="flex-shrink: 0; padding: 15px; background-color: #111; display: flex; border-top: 1px solid #444;">
                    <input type="text" id="chat-input" placeholder="Type a message or ?doubt..."
                        style="flex-grow: 1; padding: 10px; border-radius: 4px; border: none; outline: none; background: #333; color: white;">
                    <button id="send-btn"
                        style="margin-left: 8px; padding: 10px 15px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Send</button>
                </div>
            </div>

            <div class="workspace-panel"
                style="width: 70%; height: 100%; display: flex; flex-direction: column; background-color: #121212;">
                <div id="wall-of-shame-container"
                    style="flex: 0 0 35%; width: 100%; border-bottom: 2px solid #333; background-color: #1a0f0f; padding: 15px; overflow-y: auto; box-sizing: border-box;">
                    <h3
                        style="margin-top: 0; color: #ef4444; text-align: center; font-family: monospace; letter-spacing: 2px; text-shadow: 0 0 5px rgba(239, 68, 68, 0.5);">
                        🚨 WALL OF SHAME 🚨
                    </h3>
                    <div id="shame-list"
                        style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; align-items: flex-start;">
                        <div id="empty-shame"
                            style="color: #666; font-style: italic; font-size: 0.9em; margin-top: 20px;">No hostages
                            have broken focus yet...</div>
                    </div>
                </div>

                <div id="excalidraw-container" style="flex: 1; width: 100%;">
                    <iframe id="excalidrawFrame" src="https://excalidraw.com"
                        style="width: 100%; height: 100%; border: none;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <div id="votingModal" class="modal-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(4px);">
        <div class="modal-content"
            style="background: #1e1e24; padding: 30px; border-radius: 8px; border: 2px solid #ef4444; text-align: center; max-width: 450px; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);">
            <h2 style="color: #ef4444; margin-top: 0; font-family: monospace; letter-spacing: 1px;">🚨 DEMOCRATIC
                EXCEPTION 🚨</h2>
            <p id="voteModalText" style="color: white; font-size: 1.1em; margin-bottom: 25px;">[Name] wants to watch:
                [Site]. Allow?</p>
            <input type="number" id="voteMinutes" placeholder="Minutes (Type 0 to reject)"
                style="width: 100%; padding: 12px; margin-bottom: 15px; background: #2a2a35; color: white; border: 1px solid #ef4444; border-radius: 4px; font-size: 16px; outline: none;">
            <button id="btnSubmitVote"
                style="width: 100%; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: background 0.2s;">Cast
                Vote</button>
        </div>
    </div>

    <script src="https://unpkg.com/socket.io-client@4.7.4/dist/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
