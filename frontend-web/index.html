<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hostage Study Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>Hostage Study Hub</h1>
        <div id="roomStatus" style="font-weight: bold; color: #8b949e;">Not Connected</div>
    </div>

    <div class="main-container">
        <!-- Login View -->
        <div id="auth-view">
            <div class="auth-box">
                <h2 style="margin-top: 0; margin-bottom: 24px;">Join Synced Room</h2>
                <input type="text" id="userName" class="input-code" placeholder="YOUR NAME" autocomplete="off"
                    spellcheck="false" maxlength="15">
                <input type="text" id="roomCode" class="input-code" placeholder="ROOM CODE" autocomplete="off"
                    spellcheck="false" maxlength="8">
                <button id="joinBtn" class="btn-lock">Enter Study Hub</button>
            </div>
        </div>

        <!-- Hub View (Split Screen Layout) -->
        <div id="hub-view" class="study-hub-container">
            <!-- Left Panel (30%) -->
            <div class="chat-panel">
                <div class="sidebar">
                    <h2>Active Hostages</h2>
                    <ul id="userList" class="user-list">
                        <!-- Users dynamically populated -->
                    </ul>
                </div>

                <h3 id="room-display">Room: Waiting...</h3>
                <div id="chat-messages"
                    style="flex-grow: 1; overflow-y: auto; padding: 10px; background: #f9f9f9; color: #000;"></div>
                <div style="padding: 10px; display: flex; gap: 5px;">
                    <input type="text" id="chat-input" placeholder="Type a message or ?doubt..."
                        style="flex-grow: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc; color: #000;">
                    <button id="send-btn" class="btn-lock" style="width: auto; padding: 8px 16px;">Send</button>
                </div>
            </div>

            <!-- Right Panel (70%) -->
            <div class="whiteboard-panel">
                <iframe id="excalidrawFrame" src="https://excalidraw.com"></iframe>
            </div>
        </div>
    </div>

    <!-- Voting Modal (z-index: 9999, absolute positioned) -->
    <div id="votingModal" class="modal-overlay">
        <div class="modal-content">
            <h2>DEMOCRATIC EXCEPTION: VOTE REQUIRED</h2>
            <p id="voteModalText">[Name] wants to watch: [Site]. Allow?</p>
            <div class="modal-buttons">
                <button id="btnVoteYes" class="btn-lock" style="flex: 1;">Approve Pass</button>
                <button id="btnVoteNo" class="btn-lock" style="flex: 1; background-color: var(--danger-color);">Reject
                    Distraction</button>
            </div>
        </div>
    </div>

    <!-- Load Socket.io via unpkg for the web frontend -->
    <script src="https://unpkg.com/socket.io-client@4.7.4/dist/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
