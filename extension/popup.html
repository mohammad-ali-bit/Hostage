<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Hostage</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --panel-bg: #161b22;
      --text-color: #c9d1d9;
      --border-color: #30363d;
      --accent-color: #58a6ff;
      --accent-hover: #3182ce;
      --danger-color: #f85149;
      --success-color: #238636;
      --success-hover: #2ea043;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background-color 0.3s ease;
    }

    .container {
      width: 100%;
      padding: 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Minimalist Header */
    .header {
      margin-bottom: 24px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #ffffff;
      text-transform: uppercase;
    }

    .header p {
      margin: 4px 0 0;
      font-size: 13px;
      color: #8b949e;
    }

    /* Inputs & Buttons */
    .form-group {
      width: 100%;
      margin-bottom: 16px;
    }

    .input-code {
      width: 100%;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
      font-weight: bold;
      letter-spacing: 2px;
      box-sizing: border-box;
      transition: all 0.2s ease;
      outline: none;
    }

    .input-code::placeholder {
      color: #484f58;
      font-weight: normal;
      letter-spacing: normal;
    }

    .input-code:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
    }

    .btn-lock {
      width: 100%;
      background-color: var(--success-color);
      color: #ffffff;
      border: 1px solid rgba(240, 246, 252, 0.1);
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .btn-lock:hover {
      background-color: var(--success-hover);
    }

    .btn-lock:active {
      transform: scale(0.98);
    }

    /* Status Display */
    .status-box {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      min-height: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .status-box.visible {
      opacity: 1;
    }

    .status-active {
      color: var(--accent-color);
      border-color: var(--accent-hover);
    }

    /* Failed State Animation */
    body.failed-state {
      animation: pulse-intense 0.8s infinite;
    }

    body.failed-state .status-box {
      background-color: transparent;
      color: var(--danger-color);
      border: none;
      animation: none;
      box-shadow: none;
      padding: 0;
      margin-top: 10px;
    }

    .status-large {
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .status-reason {
      font-size: 14px;
      color: #ff9999;
      font-weight: normal;
    }

    @keyframes pulse-intense {
      0% {
        background-color: #000000;
      }

      50% {
        background-color: #5a0000;
      }

      100% {
        background-color: #000000;
      }
    }

    /* Privacy Badge */
    .privacy-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      font-size: 11px;
      color: #8b949e;
      background-color: rgba(35, 134, 54, 0.1);
      border: 1px solid rgba(35, 134, 54, 0.3);
      padding: 6px 12px;
      border-radius: 20px;
    }

    .privacy-badge span {
      color: var(--success-color);
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Hostage</h1>
      <p>Stay locked in, together.</p>
    </div>

    <div id="auth-view" style="width: 100%;">
      <div class="form-group" id="inputContainer">
        <input type="text" id="userName" class="input-code" placeholder="YOUR NAME" autocomplete="off"
          spellcheck="false" maxlength="15" style="margin-bottom: 12px;">
        <input type="text" id="roomCode" class="input-code" placeholder="ROOM CODE" autocomplete="off"
          spellcheck="false" maxlength="8">
      </div>
      <button id="lockInBtn" class="btn-lock">Join Session</button>
    </div>

    <div id="session-view" style="display: none; width: 100%;">
      <div id="statusBox" class="status-box" style="margin-top: 0; opacity: 1;"></div>

      <div id="leaderControls" style="display: none; margin-top: 16px;">
        <input type="number" id="studyMinutes" class="input-code" placeholder="STUDY MINUTES" min="1" max="180"
          style="margin-bottom: 12px;">
        <button id="startTimerBtn" class="btn-lock">Start Session</button>
      </div>

      <button id="studySpaceBtn" class="btn-lock" style="background-color: var(--accent-color); margin-top: 16px;">Open
        Study Space</button>

      <button id="newSessionBtn" class="btn-lock" style="background-color: var(--danger-color); margin-top: 16px;">Start
        New Session</button>
    </div>

    <!-- Voting View (Hidden by default) -->
    <div id="voting-view" style="display: none; width: 100%; text-align: center;">
      <div style="font-size: 16px; font-weight: 800; color: #ff9999; margin-bottom: 8px;">VOTING IN PROGRESS</div>
      <div id="voteQuestion" style="font-size: 14px; margin-bottom: 16px; line-height: 1.4;">
        [Name] wants to watch: [Site]. Allow?
      </div>
      <div style="display: flex; gap: 10px;">
        <button id="btnVoteApprove" class="btn-lock" style="flex: 1;">Approve</button>
        <button id="btnVoteReject" class="btn-lock"
          style="flex: 1; background-color: var(--danger-color);">Reject</button>
      </div>
    </div>

    <div id="whitelist-view"
      style="width: 100%; margin-top: 20px; text-align: left; font-size: 11px; color: #8b949e; background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; box-sizing: border-box;">
      <div style="color: var(--text-color); font-weight: bold; margin-bottom: 6px;">Allowed Content (via Title):</div>
      <ul style="margin: 0; padding-left: 16px; list-style-type: square; color: var(--success-color);">
        <li>Khan Academy</li>
        <li>MIT OpenCourseWare</li>
        <li>Veritasium</li>
        <li>3Blue1Brown</li>
        <li>Coursera</li>
        <li>Udemy</li>
      </ul>
    </div>

    <div class="privacy-badge">
      <span>🔒 Privacy Secured:</span> Only blacklisted sites are monitored locally.
    </div>
  </div>

  <script src="socket.io.js"></script>
  <script src="popup.js"></script>
</body>

</html>
