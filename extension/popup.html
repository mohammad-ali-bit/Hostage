<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Hostage Hub</title>
</head>

<body style="margin: 0; padding: 0; background: #12121a; color: white; font-family: sans-serif;">
  <div style="width: 300px; padding: 15px;">
    <h3 style="margin-top: 0; color: #ef4444; border-bottom: 1px solid #333; padding-bottom: 10px;">🛡️ HOSTAGE HUB</h3>

    <div id="setup-section">
      <input type="text" id="extName" placeholder="Your Name"
        style="width: 100%; margin-bottom: 10px; padding: 8px; background: #222; border: 1px solid #444; color: white; box-sizing: border-box; border-radius: 4px;">
      <input type="text" id="extRoom" placeholder="Room Code"
        style="width: 100%; margin-bottom: 10px; padding: 8px; background: #222; border: 1px solid #444; color: white; box-sizing: border-box; border-radius: 4px;">

      <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <button id="btnJoin"
          style="flex: 1; padding: 10px; background: #3b82f6; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px;">Join
          Study Space</button>
        <button id="btnCreate"
          style="flex: 1; padding: 10px; background: #10b981; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px;">Create
          Study Space</button>
      </div>
    </div>

    <div id="start-section" style="display: none;">
      <p style="font-size: 0.9em; margin-bottom: 10px; color: #aaa;">Configure new room timers:</p>
      <input type="number" id="extWork" placeholder="Work Time (mins)" value="25"
        style="width: 100%; margin-bottom: 10px; padding: 8px; background: #222; border: 1px solid #444; color: white; box-sizing: border-box; border-radius: 4px;">
      <input type="number" id="extBreak" placeholder="Break Time (mins)" value="5"
        style="width: 100%; margin-bottom: 10px; padding: 8px; background: #222; border: 1px solid #444; color: white; box-sizing: border-box; border-radius: 4px;">
      <button id="btnStart"
        style="width: 100%; padding: 10px; background: #ef4444; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px;">Start</button>
    </div>
  </div>
  <script src="socket.io.js"></script>
  <script src="popup.js"></script>
</body>

</html>
